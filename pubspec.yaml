name: travel_planner
description: Travel Planner - Final Project
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Навигация
  go_router: ^13.0.0

  # Состояние (Riverpod)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP запросы
  chopper: ^7.1.0

  # Конвертация JSON
  json_annotation: ^4.8.1

  # Локальная БД
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Маленькие настройки
  shared_preferences: ^2.2.3

  # Firebase
  firebase_core: ^2.30.1
  cloud_firestore: ^4.17.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0
  json_serializable: ^6.7.1
  chopper_generator: ^7.0.1
flutter:
  uses-material-design: true